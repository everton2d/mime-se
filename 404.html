  .btns{display:flex;gap:.85rem;justify-content:center;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:.45rem;padding:.8rem 1.75rem;border-radius:99px;font-size:.9rem;font-weight:700;border:none;cursor:pointer;transition:all .22s;font-family:var(--f);text-decoration:none}
  .btn-primary{background:var(--grad);color:#fff;box-shadow:0 6px 24px rgba(242,96,58,.3)}

  .btn-outline{background:transparent;color:var(--tx);border:1px solid rgba(242,96,58,.3)}
